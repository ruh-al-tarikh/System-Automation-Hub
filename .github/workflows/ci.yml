name: PowerShell CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint and Style Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for UTF-8 BOM
        shell: pwsh
        run: |
          \$invalidFiles = Get-ChildItem -Path . -Include *.ps1,*.psm1,*.psd1 -Recurse | Where-Object {
              # Check for UTF-8 BOM (0xEF, 0xBB, 0xBF)
              \$bytes = Get-Content -Path \$_.FullName -AsByteStream -TotalCount 3
              -not (\$bytes[0] -eq 0xEF -and \$bytes[1] -eq 0xBB -and \$bytes[2] -eq 0xBF)
          }
          if (\$invalidFiles) {
              foreach (\$file in \$invalidFiles) {
                  Write-Error "File '\$(\$file.FullName)' is not encoded in UTF-8 BOM."
              }
              throw "Invalid file encoding found. All .ps1 files must be UTF-8 BOM."
          }
          Write-Host "::notice title=Style Check::All PowerShell files are correctly encoded in UTF-8 BOM."

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

