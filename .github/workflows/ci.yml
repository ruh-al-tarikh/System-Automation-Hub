name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint PowerShell Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check UTF-8 BOM encoding
        shell: pwsh
        run: |
          $invalidFiles = Get-ChildItem -Path . -Include *.ps1,*.psm1,*.psd1 -Recurse | Where-Object {
              $bytes = Get-Content -Path $_.FullName -AsByteStream -TotalCount 3
              -not ($bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF)
          }

          if ($invalidFiles) {
              foreach ($file in $invalidFiles) {
                  Write-Error "File '$($file.FullName)' is not encoded in UTF-8 BOM."
              }
              throw "Invalid file encoding found."
          } else {
              Write-Host "::notice title=Encoding Check::All PowerShell files are UTF-8 BOM."
          }

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error,Warning
          if ($results) {
              $results | Format-Table
              throw "PSScriptAnalyzer found issues"
          } else {
              Write-Host "::notice title=Linting::No issues found."
          }

  test:
    name: Run Pester Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run Pester Tests
        shell: pwsh
        run: |
          if (Test-Path ./tests) {
              Import-Module Pester
              $config = New-PesterConfiguration
              $config.Run.Path = "./tests"
              $config.Run.Exit = $true
              $config.Output.Verbosity = 'Detailed'
              Invoke-Pester -Configuration $config
          } else {
              Write-Host "::notice title=Testing::No tests found."
          }